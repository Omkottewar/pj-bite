<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <!-- Background circle hint -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A50A;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C4951A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A67C10;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A7A38;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E5C2A;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- PJ letterforms stylized -->
  <text x="16" y="90" font-family="Georgia, serif" font-size="90" font-weight="900" font-style="italic" fill="url(#greenGrad)">PJ</text>
  
  <!-- Gold underline swash -->
  <path d="M14 100 Q80 118 148 100" stroke="url(#goldGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Bite text -->
  <text x="14" y="140" font-family="Georgia, serif" font-size="44" font-weight="bold" font-style="italic" fill="url(#goldGrad)">Bite</text>

  <!-- Tagline -->
  <text x="175" y="96" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1E5C2A" letter-spacing="1">Real Fruit.</text>
  <text x="175" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1E5C2A" letter-spacing="1">Real Taste.</text>
</svg>
